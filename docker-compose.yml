services:
  mongodb:
    image: mongo:7
    container_name: agrovenda-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_DATABASE: agrovenda_broker
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./infra/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: agrovenda-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "${MONGO_EXPRESS_BASICAUTH:-true}"
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USER:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:-AgroVenda2026!Secured}"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: agrovenda-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/agrovenda_broker}
      MONGO_URI: ${MONGODB_URI:-mongodb://mongodb:27017/agrovenda_broker}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_dev}
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://pdf-worker:3002}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      TSC_WATCHFILE: PriorityPollingInterval
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingFsWatchFile
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: agrovenda_frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      WDS_SOCKET_PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "find .next -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true; npm run dev"

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      target: dev
    container_name: agrovenda-mobile
    restart: unless-stopped
    profiles: ["mobile"]
    depends_on:
      - backend
    ports:
      - "${MOBILE_EXPO_PORT:-8082}:8082"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    command: npm run start -- --host 0.0.0.0 --port 8082

  pdf-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: agrovenda-pdf-worker
    restart: unless-stopped
    depends_on:
      - backend
    profiles: ["workers"]
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/agrovenda_broker}
      MONGO_URI: ${MONGODB_URI:-mongodb://mongodb:27017/agrovenda_broker}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run worker:pdf

volumes:
  mongodb_data:
  mongodb_config:
  backend_node_modules:
  mobile_node_modules:
